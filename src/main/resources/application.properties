spring.application.name=restaurant-chatbot
server.port=8080

# Anthropic API Configuration
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.api.version=2023-06-01
anthropic.model=claude-haiku-4-5-20251001
anthropic.max-tokens=500

# CORS Configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.max-age=3600

# Logging
logging.level.root=INFO
logging.level.com.chatbot=DEBUG

# ================================
# H2 Database (for development/testing)
# ================================
spring.datasource.url=jdbc:h2:mem:restaurantdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Switch to MySQL for production - comment out H2 above and uncomment:
# spring.datasource.url=jdbc:mysql://localhost:3306/restaurantdb
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# spring.jpa.hibernate.ddl-auto=update

# Restaurant config
restaurant.name=Tony's Pizzeria
restaurant.phone=(512) 555-0198
restaurant.max-capacity=30
spring.jpa.defer-datasource-initialization=true

# Admin panel credentials (change these for each client!)
admin.username=admin
admin.password=changeme123
